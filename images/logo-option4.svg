<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#232526;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#414345;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF416C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF4B2B;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg4)"/>
  
  <!-- Canvas dots array background -->
  <pattern id="dotPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="3" fill="rgba(255,255,255,0.1)"/>
  </pattern>
  <rect x="50" y="50" width="412" height="412" fill="url(#dotPattern)"/>
  
  <!-- AI Node bezier curve -->
  <path d="M 120 360 C 200 360 250 160 380 160" fill="none" stroke="url(#lineGrad)" stroke-width="24" stroke-linecap="round"/>
  <path d="M 160 200 C 220 200 240 320 340 320" fill="none" stroke="#00d2ff" stroke-width="16" stroke-linecap="round"/>
  
  <circle cx="120" cy="360" r="24" fill="#fff"/>
  <circle cx="380" cy="160" r="24" fill="#fff"/>
  
  <circle cx="160" cy="200" r="16" fill="#fff"/>
  <circle cx="340" cy="320" r="16" fill="#fff"/>
  
  <circle cx="120" cy="360" r="8" fill="#FF4B2B"/>
  <circle cx="380" cy="160" r="8" fill="#FF4B2B"/>
  <circle cx="160" cy="200" r="6" fill="#00d2ff"/>
  <circle cx="340" cy="320" r="6" fill="#00d2ff"/>
</svg>
